<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes Dashboard</title>
  <style>
    :root {
      --primary: #7169e6;
      --danger: #f44336;
      --info: #2196F3;
      --bg: #f4f6f9;
      --white: #fff;
      --shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: #333;
      line-height: 1.6;
    }

    /* Header */
    header {
      background: var(--primary);
      color: var(--white);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: bold;
    }

    header button {
      background: var(--white);
      color: var(--primary);
      border: none;
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      font-weight: 600;
      border-radius: 8px;
      transition: all 0.2s ease-in-out;
    }

    header button:hover {
      background: #e8f5e9;
    }

    /* Container */
    .container {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* Add Note */
    .add-note {
      background: var(--white);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
    }

    .add-note h2 {
      margin-bottom: 1rem;
      color: var(--primary);
    }

    .add-note input,
    .add-note textarea {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
      transition: border 0.2s ease;
    }

    .add-note input:focus,
    .add-note textarea:focus {
      border: 1px solid var(--primary);
      outline: none;
    }

    .add-note button {
      background: var(--primary);
      color: var(--white);
      border: none;
      padding: 0.7rem 1.4rem;
      cursor: pointer;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    .add-note button:hover {
      background: #45a049;
    }

    /* Notes Grid */
    #notes-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.2rem;
    }

    .note {
      background: var(--white);
      padding: 1.2rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
    }

    .note:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
    }

    .note h3 {
      margin-bottom: 0.5rem;
      color: var(--primary);
    }

    .note p {
      font-size: 0.95rem;
      margin-bottom: 1rem;
      color: #555;
    }

    .note-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .note button {
      border: none;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .note button:hover {
      opacity: 0.85;
    }

    .note .delete-btn {
      background: var(--danger);
      color: var(--white);
    }

    .note .edit-btn {
      background: var(--info);
      color: var(--white);
    }
  </style>
</head>
<body>
  <header>
    <h1> My Notes</h1>
    <button onclick="logout()">Logout</button>
  </header>

  <div class="container">
    <!-- Add Note Section -->
    <div class="add-note">
      <h2>Add New Note</h2>
      <input type="text" id="note-title" placeholder="Title" />
      <textarea id="note-content" rows="4" placeholder="Content"></textarea>
      <button onclick="addNote()">Add Note</button>
    </div>

   
    <div id="notes-container">
     
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
