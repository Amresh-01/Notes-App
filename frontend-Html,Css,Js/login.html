<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; display:flex; justify-content:center; align-items:center; height:100vh; }
    .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width:300px; }
    input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; border-radius:5px; border:1px solid #ccc; }
    button { width: 100%; padding:0.5rem; margin-top: 1rem; background:#485edb; color:white; border:none; border-radius:5px; cursor:pointer; }
    p { text-align:center; margin-top:1rem; }
    a { color:#0502b9; text-decoration:none; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>Don't have an account? <a href="signup.html">SignUp</a></p>
  </div>
    <script src="script.js"></script>
</body>
</html>
